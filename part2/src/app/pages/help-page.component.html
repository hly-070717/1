<section class="page">
  <h1>帮助中心</h1>
  <h2>常见问题</h2>
  <p><strong>Q1:</strong> 为什么新增失败？</p>
  <p><strong>A:</strong> 请检查必填项是否完整，编号是否重复，数量和价格是否为有效数字。</p>
  <p><strong>Q2:</strong> 为什么更新不到数据？</p>
  <p><strong>A:</strong> 更新按“物品名称”匹配，请确认目标名称输入准确。</p>
  <p><strong>Q3:</strong> 删除没有变化？</p>
  <p><strong>A:</strong> 删除前有确认提示，若取消确认则不会执行删除。</p>

  <h2>故障排除</h2>
  <ul>
    <li>页面空白：检查终端是否有编译报错。</li>
    <li>列表不更新：尝试点击“显示全部”刷新列表视图。</li>
    <li>输入无效：核对数字字段是否输入了字母。</li>
  </ul>
</section>
